<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d4ed8">
    <link rel="apple-touch-icon" href="1000145444.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Packing Telegram</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1d4ed8;
            --primary-hover: #1e3a8a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body { 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 15px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 25px 20px;
            text-align: center;
        }

        header {
            margin-bottom: 20px;
        }
        
        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 { 
            font-size: 20px; 
            color: var(--text-main); 
            margin: 0 0 5px 0;
            font-weight: 700;
        }

        p.subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
        }

        #video-wrapper {
            position: relative;
            margin: 20px auto;
            border-radius: 16px;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1) inset;
        }

        #video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            display: block; 
        }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            pointer-events: none;
            display: none;
        }

        .laser {
            position: absolute;
            width: 90%;
            height: 2px;
            background-color: #ef4444;
            left: 5%;
            top: 50%;
            box-shadow: 0 0 10px #ef4444;
            animation: scan-anim 2s infinite linear;
            pointer-events: none;
        }

        @keyframes scan-anim {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        #status { 
            margin-top: 15px; 
            font-weight: 600; 
            font-size: 14px; 
            padding: 16px; 
            border-radius: 12px; 
            transition: all 0.3s ease;
            line-height: 1.5;
        }

        .status-default { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .status-ready { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .status-recording { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .status-uploading { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
        .status-error { background: #fecdd3; color: #9f1239; border: 1px solid #fda4af; }

        .pulse { animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        button { 
            margin-top: 15px; 
            width: 100%;
            padding: 16px; 
            font-size: 16px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            box-shadow: 0 4px 15px rgba(29, 78, 216, 0.3);
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:active { 
            transform: scale(0.98); 
            box-shadow: 0 2px 10px rgba(29, 78, 216, 0.2);
        }

        button svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img src="1000145444.png" alt="Logo Scan Resi" class="logo">
            <h2>Scanner Packing</h2>
            <p class="subtitle">Sistem Rekam Resi Otomatis</p>
        </header>
        
        <div id="video-wrapper">
            <video id="video" playsinline muted></video>
            <div class="scan-overlay" id="scan-overlay">
                <div class="laser"></div>
            </div>
        </div>
        
        <button id="btn-start">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
            Aktifkan Kamera
        </button>
        
        <canvas id="canvas" hidden></canvas>
        
        <div id="status" class="status-default">⬆️ Pencet tombol di atas dulu ⬆️</div>
    </div>

    <script>
        // KONFIGURASI BOT TELEGRAM
        const BOT_TOKEN = '8894813796:AAHlnFbe9dsor7e8UodVDOi7LzXyBAzcbzs'; 
        const CHAT_ID = '-5400260224'; 

        const video = document.getElementById("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
        const statusDiv = document.getElementById("status");
        const btnStart = document.getElementById("btn-start");
        const scanOverlay = document.getElementById("scan-overlay");

        let isRecording = false;
        let resiAktif = "";
        let mediaRecorder = null;
        let recordedChunks = [];
        let lastScanTime = 0;
        let terakhirDiproses = 0;
        let activeStream = null;

        // Mendeteksi format video terbaik yang didukung oleh OS (Android / iOS)
        function getSupportedMimeType() {
            const types = [
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8',
                'video/webm',
                'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
                'video/mp4',
                'video/quicktime'
            ];
            for (let type of types) {
                if (MediaRecorder.isTypeSupported(type)) {
                    return type;
                }
            }
            return '';
        }

        // --- SISTEM DETEKSI VALIDASI RESI (ANTI SALAH SCAN) ---
        function isValidResi(resi) {
            const clean = resi.trim().toUpperCase();
            
            // 1. Abaikan barcode produk retail murni (EAN-8, UPC-A, atau EAN-13)
            // Ciri-cirinya: Hanya terdiri dari angka dengan panjang pas 8, 12, atau 13 digit
            if (/^\d{8}$|^\d{12,13}$/.test(clean)) {
                return false;
            }

            // 2. Batasan panjang karakter resi pengiriman umum (minimal 9 s.d 30 karakter)
            if (clean.length < 9 || clean.length > 30) {
                return false;
            }

            // 3. Pola pencocokan Regex spesifik kurir
            const patterns = [
                /^SPX[A-Z0-9]+$/i,                       // Shopee Express (SPXID...)
                /^(JP|JD|TJ|JT|JN)\d+$/i,                // J&T Express / Jet
                /^(JX|JY)\d+$/i,                         // TikTok Shop (JX / JY)
                /^[A-Z]{3}\d{9,15}$/i,                   // Anteraja / Sicepat (3 Huruf + Angka)
                /^\d{11,20}$/,                           // Resi angka murni panjang (JNE 15 digit, Sicepat 12 digit)
                /^(NLID|NIDN)[A-Z0-9]+$/i                // Ninja Van
            ];

            return patterns.some(pattern => pattern.test(clean));
        }

        // Mengaktifkan kamera dengan pengaturan HD & Ideal 60 FPS
        btnStart.addEventListener("click", function() {
            const constraints = { 
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    frameRate: { ideal: 60, min: 30 } 
                },
                audio: false // Audio mati untuk efisiensi transfer data & menghindari error codec safari
            };

            navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                activeStream = stream;
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                
                // Mencegah freeze pada iOS
                video.play().catch(e => console.log("Autoplay dicegah, mencoba lagi...", e));
                
                requestAnimationFrame(scanBarcode);

                btnStart.style.display = "none";
                scanOverlay.style.display = "block";
                
                statusDiv.innerHTML = "🟢 SIAP: Arahkan resi ke kamera";
                statusDiv.className = "status-ready";

                // Setup Perekam Video Lintas Platform
                const optimalMimeType = getSupportedMimeType();
                console.log("Menggunakan format video:", optimalMimeType);
                
                try {
                    mediaRecorder = new MediaRecorder(stream, { mimeType: optimalMimeType });
                } catch (e) {
                    console.warn("MimeType spesifik gagal, menggunakan default browser.", e);
                    mediaRecorder = new MediaRecorder(stream);
                }

                mediaRecorder.ondataavailable = function(e) {
                    if (e.data && e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = function() {
                    const optimalBlobType = optimalMimeType.split(';')[0] || 'video/webm';
                    const blob = new Blob(recordedChunks, { type: optimalBlobType });
                    
                    const fileExtension = optimalBlobType.includes('mp4') ? 'mp4' : 'webm';
                    uploadKeTelegram(blob, resiAktif, fileExtension);
                    recordedChunks = [];
                };
            })
            .catch(function(err) {
                alert("Gagal mengakses kamera! Pastikan izin kamera telah diberikan di pengaturan browser Anda.");
                console.error("Camera error:", err);
            });
        });

        // Proses membaca frame kamera secara efisien (Anti-Lag & Anti-Crash)
        function scanBarcode() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                try {
                    canvasElement.height = video.videoHeight;
                    canvasElement.width = video.videoWidth;
                    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                    
                    const waktuSekarang = Date.now();
                    
                    // Optimasi pembacaan jsQR (hanya dieksekusi setiap 250ms sekali)
                    if (waktuSekarang - terakhirDiproses > 250) {
                        terakhirDiproses = waktuSekarang;
                        
                        const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                        if (code && code.data) {
                            prosesHasilScan(code.data);
                        }
                    }
                } catch (err) {
                    console.error("Gagal membaca frame kamera:", err);
                }
            }
            requestAnimationFrame(scanBarcode);
        }

        // Logika Pengendali Perekaman (Mulai & Berhenti)
        function prosesHasilScan(data) {
            const waktuSekarang = Date.now();
            if (waktuSekarang - lastScanTime < 3000) return; // Proteksi double scan (jeda 3 detik)

            // Validasi: Apakah yang terscan adalah resi asli? Jika tidak, abaikan secara senyap.
            if (!isValidResi(data)) {
                return; 
            }

            if (!isRecording) {
                // MULAI MEREKAM
                resiAktif = data;
                isRecording = true;
                lastScanTime = waktuSekarang;
                recordedChunks = []; // Bersihkan cache video lama
                
                try {
                    mediaRecorder.start();
                    statusDiv.innerHTML = `🔴 MEREKAM RESI:<br><strong style="font-size:16px">${resiAktif}</strong>`;
                    statusDiv.className = "status-recording pulse";
                    scanOverlay.style.borderColor = "#ef4444"; 
                } catch (err) {
                    console.error("MediaRecorder gagal dijalankan:", err);
                    isRecording = false;
                    statusDiv.innerHTML = "❌ Gagal mulai rekam. Coba pencet ulang kamera.";
                    statusDiv.className = "status-error";
                }
            } else {
                // BERHENTI MEREKAM (Jika scan ulang kode resi yang sama)
                if (data === resiAktif) {
                    isRecording = false;
                    lastScanTime = waktuSekarang;
                    
                    try {
                        mediaRecorder.stop();
                        statusDiv.innerHTML = "⏳ Mengunggah bukti video...<br><span style='font-weight:400; font-size:12px'>Harap tunggu sebentar.</span>";
                        statusDiv.className = "status-uploading";
                        scanOverlay.style.borderColor = "rgba(255, 255, 255, 0.2)";
                    } catch (err) {
                        console.error("MediaRecorder gagal berhenti:", err);
                        isRecording = false;
                        statusDiv.innerHTML = "❌ Gagal memproses file rekaman.";
                        statusDiv.className = "status-error";
                    }
                } else {
                    // Peringatan jika ter-scan resi lain sebelum paket yang aktif selesai dibungkus
                    alert("⚠️ PERINGATAN: Selesaikan dahulu paket ini! Arahkan resi " + resiAktif + " untuk berhenti merekam.");
                    lastScanTime = waktuSekarang;
                }
            }
        }

        // Detektor Nama Marketplace untuk Caption Telegram
        function deteksiMarketplace(resi) {
            const resiUpper = resi.toUpperCase();
            if (resiUpper.startsWith("SPX") || resiUpper.startsWith("JP") || resiUpper.startsWith("ID")) {
                return "Shopee";
            } else if (resiUpper.startsWith("JX") || resiUpper.startsWith("JY")) {
                return "TikTokShop by Tokopedia";
            } else {
                return "⚪ Umum / Lainnya";
            }
        }

        // Pengiriman Data Video ke API Bot Telegram (Dilengkapi Penanganan Error)
        function uploadKeTelegram(blob, resi, formatEkstensi) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`;
            
            const now = new Date();
            const namaHari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'][now.getDay()];
            const tanggal = String(now.getDate()).padStart(2, '0');
            const namaBulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'][now.getMonth()];
            const tahun = now.getFullYear();
            const jam = String(now.getHours()).padStart(2, '0');
            const menit = String(now.getMinutes()).padStart(2, '0');

            const waktuDetail = `${namaHari}, ${tanggal} ${namaBulan} ${tahun} | ${jam}:${menit}`;
            const asalMarketplace = deteksiMarketplace(resi);

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            
            const captionTeks = `📦 Bukti Packing\n🛒 Asal: ${asalMarketplace}\n🔖 Resi: ${resi}\n🕒 Waktu: ${waktuDetail}`;
            formData.append('caption', captionTeks);
            
            // Format penamaan file dinamis sesuai ekstensi format video browser (webm/mp4)
            formData.append('video', blob, `packing_${resi}.${formatEkstensi}`);

            fetch(url, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.ok) {
                    statusDiv.innerHTML = "✅ BERHASIL DIUNGGAH!<br>🟢 SIAP: Arahkan resi selanjutnya";
                    statusDiv.className = "status-ready";
                } else {
                    throw new Error(data.description || "Gagal diunggah.");
                }
            })
            .catch(error => {
                console.error("Telegram Upload Error:", error);
                alert("❌ Gagal Mengunggah ke Telegram. Periksa jaringan Anda dan coba kirim ulang.");
                statusDiv.innerHTML = "❌ Gagal Mengunggah. Silakan Coba Lagi.";
                statusDiv.className = "status-error";
                
                // Kembalikan ke mode siap agar aplikasi tidak terkunci macet
                setTimeout(() => {
                    if(!isRecording) {
                        statusDiv.innerHTML = "🟢 SIAP: Arahkan resi selanjutnya";
                        statusDiv.className = "status-ready";
                    }
                }, 4000);
            });
        }
    </script>
    <script>
        // Registrasi Service Worker untuk PWA offline-ready
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA Siap!'))
                .catch(err => console.log('PWA Error:', err));
            });
        }
    </script>
</body>
</html>
