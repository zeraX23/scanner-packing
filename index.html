<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Packing Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
               text-align: center; background-color: #f0f2f5; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        
        h2 { font-size: 20px; color: #1a73e8; margin-bottom: 10px; }
        
        #video-container { width: 100%; max-width: 400px; aspect-ratio: 16/9; background: #000; 
                           margin: 0 auto 15px; border-radius: 15px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        #status { font-weight: 700; font-size: 16px; padding: 20px; border-radius: 12px; 
                  background: #fff; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        #btn-start { width: 100%; max-width: 400px; padding: 20px; font-size: 18px; font-weight: bold; 
                     background: #1a73e8; color: white; border: none; border-radius: 12px; cursor: pointer; }
        
        .recording { background: #dc3545 !important; color: white !important; animation: blink 1.5s infinite; }
        .uploading { background: #ffc107 !important; color: #000 !important; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h2>📦 Packing Scan Pro</h2>
    
    <div id="video-container">
        <video id="video" playsinline muted></video>
    </div>
    
    <div id="status">Pencet tombol untuk mulai</div>
    <button id="btn-start">📸 AKTIFKAN KAMERA</button>
    <canvas id="canvas" hidden></canvas>

    <script>
        const BOT_TOKEN = '8894813796:AAHlnFbe9dsor7e8UodVDOi7LzXyBAzcbzs'; 
        const CHAT_ID = '-5400260224';

        const video = document.getElementById("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
        const statusDiv = document.getElementById("status");
        const btnStart = document.getElementById("btn-start");

        let isRecording = false;
        let resiAktif = "";
        let mediaRecorder;
        let recordedChunks = [];
        let lastScanTime = 0;

        btnStart.addEventListener("click", function() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
                video.srcObject = stream;
                video.play();
                requestAnimationFrame(scanBarcode);
                btnStart.style.display = "none";
                updateStatus("🟢 SIAP: Arahkan resi ke kamera", "");

                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    uploadKeTelegram(new Blob(recordedChunks, { type: 'video/webm' }), resiAktif);
                    recordedChunks = [];
                };
            }).catch(err => alert("Gagal akses kamera!"));
        });

        function updateStatus(text, className) {
            statusDiv.innerHTML = text;
            statusDiv.className = className;
        }

        function scanBarcode() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvasElement.height = video.videoHeight; canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0);
                const code = jsQR(canvas.getImageData(0,0,canvasElement.width,canvasElement.height).data, canvasElement.width, canvasElement.height);
                if (code) prosesHasilScan(code.data);
            }
            requestAnimationFrame(scanBarcode);
        }

        function prosesHasilScan(data) {
            if (Date.now() - lastScanTime < 3000) return;
            if (!isRecording) {
                resiAktif = data; isRecording = true; lastScanTime = Date.now();
                mediaRecorder.start();
                updateStatus("🔴 MEREKAM: " + resiAktif, "recording");
            } else if (data === resiAktif) {
                isRecording = false; lastScanTime = Date.now();
                mediaRecorder.stop();
                updateStatus("⏳ Mengunggah...", "uploading");
            }
        }

        function uploadKeTelegram(blob, resi) {
            const now = new Date();
            const waktu = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('caption', `📦 Packing: ${resi}\n🛒 ${resi.startsWith("JX") || resi.startsWith("JY") ? "TikTok/Tokopedia" : "Shopee"}\n🕒 ${waktu}`);
            formData.append('video', blob, `resi_${resi}.webm`);

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.ok) updateStatus("✅ BERHASIL!", "");
                else updateStatus("❌ Gagal: " + data.description, "");
            });
        }
    </script>
</body>
</html>
